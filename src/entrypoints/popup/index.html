<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slack Enhancements</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="popup">
      <h1>Slack Enhancements</h1>

      <div class="toggles">
        <label class="toggle-row">
          <span class="toggle-label">Redirect Prevention</span>
          <input type="checkbox" id="toggle-redirectPrevention" />
          <span class="toggle-slider"></span>
        </label>

        <label class="toggle-row">
          <span class="toggle-label">Quick Message Actions</span>
          <input type="checkbox" id="toggle-quickMessageActions" />
          <span class="toggle-slider"></span>
        </label>

        <label class="toggle-row">
          <span class="toggle-label">Recent Threads</span>
          <input type="checkbox" id="toggle-recentThreads" />
          <span class="toggle-slider"></span>
        </label>

        <label class="toggle-row">
          <span class="toggle-label">Manual Read Control</span>
          <input type="checkbox" id="toggle-manualThreadReadControl" />
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="recent-threads-section" id="recent-threads-section">
        <h2>Recent Threads</h2>
        <div id="recent-threads-list" class="threads-list">
          <p class="empty-state">No recent threads tracked yet.</p>
        </div>
      </div>
    </div>
    <script src="./main.ts" type="module"></script>
  </body>
</html>
