<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sensible Slack</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="popup">
      <h1>Sensible Slack</h1>

      <div class="toggles">
        <label class="toggle-row">
          <span class="toggle-label">Manual "Mark as Read" on Threads page</span>
          <input type="checkbox" id="toggle-manualThreadReadControl" />
          <span class="toggle-slider"></span>
        </label>

        <label class="toggle-row">
          <span class="toggle-label">More Quick Message Actions</span>
          <input type="checkbox" id="toggle-quickMessageActions" />
          <span class="toggle-slider"></span>
        </label>

        <div class="sub-toggles" id="sub-toggles-quickMessageActions">
          <label class="checkbox-row">
            <input type="checkbox" id="toggle-quickActionEditMessage" />
            <span class="checkbox-label">Edit message (own messages only)</span>
          </label>
          <label class="checkbox-row">
            <input type="checkbox" id="toggle-quickActionCopyLink" />
            <span class="checkbox-label">Copy link</span>
          </label>
          <label class="checkbox-row">
            <input type="checkbox" id="toggle-quickActionOpenThread" />
            <span class="checkbox-label">Open thread in new tab</span>
          </label>
          <label class="checkbox-row">
            <input type="checkbox" id="toggle-quickActionSplitView" />
            <span class="checkbox-label">Open in split view</span>
          </label>
          <label class="checkbox-row">
            <input type="checkbox" id="toggle-quickActionMarkUnread" />
            <span class="checkbox-label">Mark unread</span>
          </label>
        </div>
        <label class="toggle-row">
          <span class="toggle-label">Auto-format pasted links</span>
          <input type="checkbox" id="toggle-autoFormatLinks" />
          <span class="toggle-slider"></span>
        </label>

        <div class="sub-toggles" id="sub-toggles-autoFormatLinks">
          <label class="checkbox-row">
            <input type="checkbox" id="toggle-autoFormatGithubLinks" />
            <span class="checkbox-label">GitHub PR/issue links</span>
          </label>
          <label class="checkbox-row">
            <input type="checkbox" id="toggle-autoFormatJiraLinks" />
            <span class="checkbox-label">Jira issue links</span>
          </label>
        </div>
      </div>

      <div class="footer">
        GitHub: <a href="https://github.com/mturley/sensible-slack-extension" target="_blank">mturley/sensible-slack-extension</a>
      </div>
    </div>
    <script src="./main.ts" type="module"></script>
  </body>
</html>
