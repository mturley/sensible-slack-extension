<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slack Enhancements</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="popup">
      <h1>Slack Enhancements</h1>

      <div class="toggles">
        <label class="toggle-row">
          <span class="toggle-label">More Quick Message Actions</span>
          <input type="checkbox" id="toggle-quickMessageActions" />
          <span class="toggle-slider"></span>
        </label>

        <label class="toggle-row">
          <span class="toggle-label">Manual Read Control in All Threads view</span>
          <input type="checkbox" id="toggle-manualThreadReadControl" />
          <span class="toggle-slider"></span>
        </label>
      </div>

    </div>
    <script src="./main.ts" type="module"></script>
  </body>
</html>
